<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WonderWall Output</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    canvas { width: 100%; height: 100%; display: block; }
    #status {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 8px 20px;
      border-radius: 12px;
      font: 14px system-ui, sans-serif;
      z-index: 10;
      transition: opacity 0.5s;
    }
    #status.hidden { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="status">Connecting...</div>

  <script type="module">
    // Import patterns from the built patterns package
    // The server bundles this at build time via a simple copy or Vite build
    // For dev, we use a self-contained pattern renderer

    // ---- Inline pattern registry (lightweight subset for output page) ----
    // This avoids needing a build step for the output page.
    // The server sends pattern ID + params, and we render them here.

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const statusEl = document.getElementById('status');

    let currentPattern = null;
    let currentParams = {};
    let animationId = null;

    function resize() {
      const dpr = window.devicePixelRatio || 1;
      canvas.width = window.innerWidth * dpr;
      canvas.height = window.innerHeight * dpr;
      ctx.scale(dpr, dpr);
      draw();
    }

    function draw() {
      if (!currentPattern) {
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
        ctx.fillStyle = '#333';
        ctx.font = '24px system-ui';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('Waiting for pattern...', window.innerWidth / 2, window.innerHeight / 2);
        return;
      }
      // Patterns are rendered by the pattern functions loaded dynamically
      if (patterns[currentPattern]) {
        if (patterns[currentPattern].animate) {
          // Start animation loop
          return;
        }
        patterns[currentPattern].render(ctx, window.innerWidth, window.innerHeight, currentParams);
      }
    }

    function startAnimation() {
      if (animationId) cancelAnimationFrame(animationId);
      animationId = null;

      if (!currentPattern || !patterns[currentPattern]?.animate) return;

      function frame(time) {
        const dpr = window.devicePixelRatio || 1;
        canvas.width = window.innerWidth * dpr;
        canvas.height = window.innerHeight * dpr;
        ctx.scale(dpr, dpr);
        ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
        patterns[currentPattern].animate(ctx, window.innerWidth, window.innerHeight, currentParams, time);
        animationId = requestAnimationFrame(frame);
      }
      animationId = requestAnimationFrame(frame);
    }

    // ---- Built-in pattern renderers (matching @wonderwall/patterns) ----
    // These are intentionally duplicated here to keep the output page self-contained.
    // The output page must work without a build pipeline.

    const BARS_75 = ['#c0c0c0','#c0c000','#00c0c0','#00c000','#c000c0','#c00000','#0000c0'];
    const BARS_100 = ['#ffffff','#ffff00','#00ffff','#00ff00','#ff00ff','#ff0000','#0000ff'];
    const PLUGE = ['#0000a0','#ffffff','#3f0090','#000000','#090909','#000000','#1a1a1a','#000000'];

    const patterns = {
      'solid': {
        render(ctx, w, h, p) {
          ctx.fillStyle = p.color || '#ff0000';
          ctx.fillRect(0, 0, w, h);
        }
      },
      'smpte-bars': {
        render(ctx, w, h, p) {
          const bars = p.intensity === '100' ? BARS_100 : BARS_75;
          const topH = h * 0.67, midH = h * 0.08, botH = h - topH - midH;
          const bw = w / 7;
          for (let i = 0; i < 7; i++) { ctx.fillStyle = bars[i]; ctx.fillRect(Math.round(i*bw), 0, Math.ceil(bw), topH); }
          const midBars = p.intensity === '100'
            ? ['#0000ff','#000000','#ff00ff','#000000','#00ffff','#000000','#ffffff']
            : ['#0000c0','#000000','#c000c0','#000000','#00c0c0','#000000','#c0c0c0'];
          for (let i = 0; i < 7; i++) { ctx.fillStyle = midBars[i]; ctx.fillRect(Math.round(i*bw), topH, Math.ceil(bw), midH); }
          const pw = [w/6,w/6,w/6,w/6,w/24,w/24,w/24,w/24+w/6]; let x = 0;
          for (let i = 0; i < PLUGE.length; i++) { ctx.fillStyle = PLUGE[i]; ctx.fillRect(Math.round(x), topH+midH, Math.ceil(pw[i]), botH); x += pw[i]; }
        }
      },
      'numbered-grid': {
        render(ctx, w, h, p) {
          const cols = p.columns || 4, rows = p.rows || 3;
          const cw = w/cols, ch = h/rows, total = cols*rows;
          for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) {
            const i = r*cols+c, hue = (i*(360/total))%360;
            const x = Math.round(c*cw), y = Math.round(r*ch);
            const sw = Math.round((c+1)*cw)-x, sh = Math.round((r+1)*ch)-y;
            ctx.fillStyle = `hsl(${hue},70%,30%)`; ctx.fillRect(x,y,sw,sh);
            if (p.showBorder !== false) { ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.strokeRect(x+1,y+1,sw-2,sh-2); }
            const fs = Math.min(sw,sh)*0.4;
            ctx.font = `bold ${fs}px sans-serif`; ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.textBaseline='middle';
            ctx.fillText(String(i+1), x+sw/2, y+sh/2);
          }
        }
      },
      'crosshatch': {
        render(ctx, w, h, p) {
          const sp = p.spacing || 64, lc = p.lineColor || '#fff', bg = p.bgColor || '#000', lw = p.lineWidth || 1;
          ctx.fillStyle = bg; ctx.fillRect(0,0,w,h);
          const off = lw%2===1?0.5:0;
          ctx.strokeStyle = lc; ctx.lineWidth = lw; ctx.beginPath();
          for (let x = 0; x <= w; x += sp) { ctx.moveTo(x+off,0); ctx.lineTo(x+off,h); }
          for (let y = 0; y <= h; y += sp) { ctx.moveTo(0,y+off); ctx.lineTo(w,y+off); }
          ctx.stroke();
          const cw2 = lw+2, co = cw2%2===1?0.5:0;
          ctx.lineWidth = cw2; ctx.beginPath();
          ctx.moveTo(w/2+co,0); ctx.lineTo(w/2+co,h); ctx.moveTo(0,h/2+co); ctx.lineTo(w,h/2+co);
          ctx.stroke();
        }
      },
      'gradient': {
        render(ctx, w, h, p) {
          const ch = p.channel || 'grayscale', dir = p.direction || 'horizontal', steps = p.steps || 0;
          const color = (t) => { const v = Math.round(t*255); return ch==='red'?`rgb(${v},0,0)`:ch==='green'?`rgb(0,${v},0)`:ch==='blue'?`rgb(0,0,${v})`:`rgb(${v},${v},${v})`; };
          if (steps > 0) {
            const isH = dir==='horizontal', sz = isH?w:h, ss = sz/steps;
            for (let i = 0; i < steps; i++) { const t = steps<=1?0:i/(steps-1); ctx.fillStyle = color(t);
              if (isH) { const x=Math.round(i*ss); ctx.fillRect(x,0,Math.round((i+1)*ss)-x,h); }
              else { const y=Math.round(i*ss); ctx.fillRect(0,y,w,Math.round((i+1)*ss)-y); }
            }
          } else {
            const isH = dir==='horizontal';
            const grad = isH?ctx.createLinearGradient(0,0,w,0):ctx.createLinearGradient(0,0,0,h);
            for (let i = 0; i <= 16; i++) grad.addColorStop(i/16, color(i/16));
            ctx.fillStyle = grad; ctx.fillRect(0,0,w,h);
          }
        }
      },
      'sequential-flash': {
        animate(ctx, w, h, p, time) {
          const cols = p.columns||4, rows = p.rows||3, speed = p.speed||1000, fc = p.flashColor||'#fff';
          const total = cols*rows, active = Math.floor(time/speed)%total;
          const cw = w/cols, ch = h/rows;
          ctx.fillStyle = '#000'; ctx.fillRect(0,0,w,h);
          for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) {
            const i = r*cols+c, x=Math.round(c*cw), y=Math.round(r*ch);
            const sw=Math.round((c+1)*cw)-x, sh=Math.round((r+1)*ch)-y;
            if (i===active) {
              ctx.fillStyle=fc; ctx.fillRect(x,y,sw,sh);
              ctx.font=`bold ${Math.min(sw,sh)*0.3}px sans-serif`; ctx.fillStyle='#000'; ctx.textAlign='center'; ctx.textBaseline='middle';
              ctx.fillText(`#${i}`,x+sw/2,y+sh/2);
            } else {
              ctx.strokeStyle='rgba(255,255,255,0.1)'; ctx.lineWidth=1; ctx.strokeRect(x,y,sw,sh);
              ctx.font=`${Math.min(sw,sh)*0.15}px sans-serif`; ctx.fillStyle='rgba(255,255,255,0.15)'; ctx.textAlign='center'; ctx.textBaseline='middle';
              ctx.fillText(`${i}`,x+sw/2,y+sh/2);
            }
          }
        },
        render(ctx, w, h, p) { this.animate(ctx, w, h, p, 0); }
      },
      'pixel-walk': {
        animate(ctx, w, h, p, time) {
          const size = p.dotSize||4, speed = p.speed||50, color = p.color||'#fff';
          const cols = Math.ceil(w/size), rows = Math.ceil(h/size), total = cols*rows;
          const idx = Math.floor(time/speed)%total;
          ctx.fillStyle='#000'; ctx.fillRect(0,0,w,h);
          ctx.fillStyle=color; ctx.fillRect((idx%cols)*size, Math.floor(idx/cols)*size, size, size);
        },
        render(ctx,w,h,p) { this.animate(ctx,w,h,p,0); }
      },
      'color-wash': {
        animate(ctx, w, h, p, time) {
          const cyc = (p.speed||10)*1000, sat = p.saturation??100, light = p.lightness??50;
          const hue = (time/cyc)*360%360;
          ctx.fillStyle=`hsl(${hue},${sat}%,${light}%)`; ctx.fillRect(0,0,w,h);
        },
        render(ctx,w,h,p) { this.animate(ctx,w,h,p,0); }
      },
      'alignment-crosses': {
        render(ctx, w, h, p) {
          const color = p.color||'#fff', bg = p.bgColor||'#000', arm = p.armLength||40;
          ctx.fillStyle=bg; ctx.fillRect(0,0,w,h);
          ctx.strokeStyle=color; ctx.lineWidth=1;
          const pts = [[w/2,h/2],[0,0],[w,0],[0,h],[w,h],[w/2,0],[w/2,h],[0,h/2],[w,h/2],[w/4,h/4],[3*w/4,h/4],[w/4,3*h/4],[3*w/4,3*h/4]];
          for (const [cx,cy] of pts) {
            ctx.beginPath(); ctx.moveTo(cx-arm,cy); ctx.lineTo(cx+arm,cy); ctx.moveTo(cx,cy-arm); ctx.lineTo(cx,cy+arm); ctx.stroke();
            ctx.beginPath(); ctx.arc(cx,cy,3,0,Math.PI*2); ctx.stroke();
          }
          ctx.lineWidth=2; ctx.strokeRect(1,1,w-2,h-2);
        }
      },
      'resolution-check': {
        render(ctx, w, h, p) {
          const size = p.blockSize||1, c1 = p.color1||'#fff', c2 = p.color2||'#000';
          ctx.fillStyle=c2; ctx.fillRect(0,0,w,h); ctx.fillStyle=c1;
          for (let y=0;y<h;y+=size) for (let x=0;x<w;x+=size) if ((Math.floor(x/size)+Math.floor(y/size))%2===0) ctx.fillRect(x,y,size,size);
        }
      },
      'brightness-steps': {
        render(ctx, w, h, p) {
          const steps = p.steps||21, isH = (p.direction||'horizontal')==='horizontal', labels = p.showLabels!==false;
          const sz = isH?w:h, ss = sz/steps;
          for (let i=0;i<steps;i++) {
            const t = i/(steps-1), v = Math.round(t*255);
            ctx.fillStyle=`rgb(${v},${v},${v})`;
            if (isH) { const x=Math.round(i*ss); ctx.fillRect(x,0,Math.round((i+1)*ss)-x,h); }
            else { const y=Math.round(i*ss); ctx.fillRect(0,y,w,Math.round((i+1)*ss)-y); }
            if (labels) {
              const lx = isH?Math.round(i*ss+ss/2):w/2, ly = isH?h/2:Math.round(i*ss+ss/2);
              ctx.fillStyle=v>128?'#000':'#fff'; ctx.font=`bold ${Math.min(isH?ss*0.4:14,14)}px sans-serif`;
              ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(`${Math.round(t*100)}%`,lx,ly);
            }
          }
        }
      },
      'custom-text': {
        render(ctx, w, h, p) {
          const text = p.text||'WonderWall', fs = p.fontSize||120, color = p.color||'#fff', bg = p.bgColor||'#000';
          ctx.fillStyle=bg; ctx.fillRect(0,0,w,h);
          ctx.fillStyle=color; ctx.font=`bold ${fs}px sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
          ctx.fillText(text,w/2,h/2);
          if (p.showInfo!==false) { ctx.fillStyle='rgba(255,255,255,0.3)'; ctx.font='14px sans-serif'; ctx.textBaseline='bottom'; ctx.fillText(`${w} × ${h}`,w/2,h-16); }
        }
      },
      'seam-finder': {
        render(ctx, w, h, p) {
          const cols=p.columns||4, rows=p.rows||3, bw=p.bandWidth||8, c1=p.color1||'#f00', c2=p.color2||'#0f0';
          ctx.fillStyle='#000'; ctx.fillRect(0,0,w,h);
          const cw=w/cols, ch=h/rows;
          for (let c=1;c<cols;c++) { const x=Math.round(c*cw); for (let i=0;i<Math.floor(h/bw);i++) { ctx.fillStyle=i%2===0?c1:c2; ctx.fillRect(x-bw,i*bw,bw*2,bw); } }
          for (let r=1;r<rows;r++) { const y=Math.round(r*ch); for (let i=0;i<Math.floor(w/bw);i++) { ctx.fillStyle=i%2===0?c1:c2; ctx.fillRect(i*bw,y-bw,bw,bw*2); } }
        }
      },
      'motion-test': {
        animate(ctx, w, h, p, time) {
          const bw=p.barWidth||40, speed=p.speed||200, color=p.color||'#fff', isH=(p.direction||'horizontal')!=='vertical';
          ctx.fillStyle='#000'; ctx.fillRect(0,0,w,h);
          const sp=bw*3, off=(time/1000*speed)%sp; ctx.fillStyle=color;
          if (isH) { for (let x=-bw+off;x<w;x+=sp) ctx.fillRect(x,0,bw,h); }
          else { for (let y=-bw+off;y<h;y+=sp) ctx.fillRect(0,y,w,bw); }
        },
        render(ctx,w,h,p) { this.animate(ctx,w,h,p,0); }
      },
      'uniformity-white': {
        render(ctx, w, h, p) {
          const pct=parseInt(p.brightness||'100',10), v=Math.round(pct/100*255);
          ctx.fillStyle=`rgb(${v},${v},${v})`; ctx.fillRect(0,0,w,h);
          ctx.fillStyle=v>128?'rgba(0,0,0,0.3)':'rgba(255,255,255,0.3)';
          ctx.font='16px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='bottom';
          ctx.fillText(`${pct}% White (${v}/255)`,w/2,h-16);
        }
      },
    };

    // ---- WebSocket connection ----
    const wsUrl = `ws://${location.host}/ws/output`;
    let ws = null;
    let reconnectTimer = null;

    function connect() {
      ws = new WebSocket(wsUrl);

      ws.onopen = () => {
        statusEl.textContent = 'Connected — waiting for pattern';
        setTimeout(() => statusEl.classList.add('hidden'), 2000);
      };

      ws.onmessage = (evt) => {
        try {
          const msg = JSON.parse(evt.data);
          if (msg.type === 'pattern') {
            if (animationId) cancelAnimationFrame(animationId);
            animationId = null;
            currentPattern = msg.id;
            currentParams = msg.params || {};
            statusEl.classList.add('hidden');
            resize();
            if (patterns[currentPattern]?.animate) {
              startAnimation();
            }
          }
        } catch {}
      };

      ws.onclose = () => {
        statusEl.textContent = 'Disconnected — reconnecting...';
        statusEl.classList.remove('hidden');
        reconnectTimer = setTimeout(connect, 2000);
      };

      ws.onerror = () => ws.close();
    }

    window.addEventListener('resize', () => {
      if (animationId) return; // animation loop handles resize
      resize();
    });

    resize();
    connect();
  </script>
</body>
</html>
